name: "E-Commerce Dashboard"
description: "Combined e-commerce analytics dashboard (Shopify, Kaufland, eBay) with bookkeeping"
slug: ecommerce-dashboard
url: "https://github.com/Smoothstylez/Ecom-Dash"
version: "0.3.1"

arch:
  - amd64
  - aarch64

init: false
homeassistant_api: false

ingress: true
ingress_port: 8012
panel_icon: "mdi:chart-box-outline"
panel_title: "E-Commerce"

ports:
  "8012/tcp": null
ports_description:
  "8012/tcp": "Web interface (not needed when using ingress)"

map:
  - type: data
    read_only: false

options:
  shopify_client_id: ""
  shopify_client_secret: ""
  shopify_shop_domain: ""
  shop_client_key: ""
  shop_secret_key: ""
  live_sync_enabled: false
  live_sync_interval_seconds: 300

schema:
  shopify_client_id: str?
  shopify_client_secret: str?
  shopify_shop_domain: str?
  shop_client_key: str?
  shop_secret_key: str?
  live_sync_enabled: bool
  live_sync_interval_seconds: int
